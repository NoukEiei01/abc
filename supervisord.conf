[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:Xvnc]
command=/usr/bin/Xtigervnc :1 -rfbport 5901 -geometry 1280x720 -depth 24 -nolisten tcp -localhost no -SecurityTypes None -desktop "Nouk Desktop" -pn
autostart=true
autorestart=true
priority=10
startsecs=3
startretries=10
user=Nouk
environment=HOME="/home/Nouk",USER="Nouk",LOGNAME="Nouk"
stdout_logfile=/var/log/supervisor/xvnc.log
stderr_logfile=/var/log/supervisor/xvnc-err.log

[program:xfce4]
command=/bin/bash -c "sleep 5 && DISPLAY=:1 dbus-launch --exit-with-session startxfce4"
autostart=true
autorestart=true
priority=20
startsecs=5
user=Nouk
environment=DISPLAY=":1",HOME="/home/Nouk",USER="Nouk",LOGNAME="Nouk"
stdout_logfile=/var/log/supervisor/xfce4.log
stderr_logfile=/var/log/supervisor/xfce4-err.log

[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman --nodaemon
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/xrdp-sesman.log
stderr_logfile=/var/log/supervisor/xrdp-sesman-err.log

[program:xrdp]
command=/usr/sbin/xrdp --nodaemon
autostart=true
autorestart=true
priority=35
startsecs=3
stdout_logfile=/var/log/supervisor/xrdp.log
stderr_logfile=/var/log/supervisor/xrdp-err.log

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc/ 6080 localhost:5901
autostart=true
autorestart=true
priority=40
startsecs=8
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc-err.log
