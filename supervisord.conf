[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:vncserver]
command=/bin/bash -c "
    rm -f /tmp/.X1-lock /tmp/.X11-unix/X1 2>/dev/null;
    echo '=== VNC START ===' >> /var/log/vnc-debug.log;
    echo 'passwd exists:' >> /var/log/vnc-debug.log;
    ls -la /home/Nouk/.vnc/ >> /var/log/vnc-debug.log 2>&1;
    su - Nouk -c '/usr/bin/tigervncserver :1 -geometry 1280x720 -depth 24 -rfbport 5901 -fg -nolisten tcp -verbose' >> /var/log/vnc-debug.log 2>&1
"
autostart=true
autorestart=false
priority=10
stdout_logfile=/var/log/supervisor/vnc.log
stderr_logfile=/var/log/supervisor/vnc-err.log

[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman --nodaemon
autostart=true
autorestart=true
priority=15
stdout_logfile=/var/log/supervisor/xrdp-sesman.log
stderr_logfile=/var/log/supervisor/xrdp-sesman-err.log

[program:xrdp]
command=/usr/sbin/xrdp --nodaemon
autostart=true
autorestart=true
priority=20
startsecs=3
stdout_logfile=/var/log/supervisor/xrdp.log
stderr_logfile=/var/log/supervisor/xrdp-err.log

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc/ 6080 localhost:5901
autostart=true
autorestart=true
priority=25
startsecs=10
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc-err.log

[program:logdump]
command=/bin/bash -c "sleep 10 && cat /var/log/vnc-debug.log && cat /home/Nouk/.vnc/*.log 2>/dev/null || true"
autostart=true
autorestart=false
priority=99
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
